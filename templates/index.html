<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeSpace - Women's Safety Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">🛡️ SafeSpace</div>
      <p class="tagline">A safe place to talk. We're here for you.</p>
    </header>

    <div class="chat-container" id="chat-container">
      <div class="message bot">
        <div class="bubble">
          Hi, I'm SafeSpace. You can talk to me about anything that's making you feel unsafe or uncomfortable. I'm here to listen, support, and help. 💜
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Tell me what's happening..." rows="2"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
